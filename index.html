<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Planet - Explore Our Solar System Through Data. Capstone project header.">
  <title>Planet - Explore Our Solar System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <!-- Navbar Component -->
    <nav class="navbar" id="navbar">
      <div class="navbar-container">
        <a href="/" class="navbar-logo" id="navbar-logo">
          <img
            src="assets/logo.svg"
            alt="Planet logo"
            class="navbar-logo-icon"
          />
        </a>
      </div>
    </nav>

    <!-- Hero Component -->
    <section class="hero" id="hero-section">
      <div class="hero-container">
        <div class="hero-content">
          <h1 class="hero-title" id="hero-title">
            Explore Our Solar System Through Data
          </h1>
          <p class="hero-description" id="hero-description">
            Understand the planets not just by name, but by measurable
            facts. From size and mass to gravity and density, this page
            breaks down the solar system in a clear, data-driven way.
          </p>
          <div class="hero-actions">
            <a href="#explore" class="btn btn-primary" id="btn-explore">
              Explore the Data
            </a>
            <a href="#contact" class="btn btn-outline" id="btn-contact">
              Contact Us
            </a>
          </div>
        </div>

        <div class="hero-visual">
          <div class="hero-planet-wrapper">
            <div class="hero-planet-glow"></div>
            <img
              src="assets/earth.svg"
              alt="A glowing 3D planet Earth floating in space"
              class="hero-planet-img"
              id="hero-planet-img"
            />
          </div>
        </div>
      </div>
    </section>
  </div>
</body>
</html>
