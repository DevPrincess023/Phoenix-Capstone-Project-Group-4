<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Planet - Explore our Solar System through Data">
  <title>Planet - Solar System Data</title>
  
  <!-- Font stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar" id="navbar">
    <div class="navbar-container">
      <a href="#hero-section" class="navbar-logo" id="navbar-logo">
        <img
          src="assets/logo.svg"
          alt="Planet logo"
          class="navbar-logo-icon"
        />
      </a>

      <!-- Navigation links removed -->
    </div>
  </nav>

  <!-- HERO SECTION -->
  <section class="hero" id="hero-section">
    <div class="hero-container">
      <div class="hero-content">
        <h1 class="hero-title" id="hero-title">
          Explore Our Solar System Through Data
        </h1>
        <p class="hero-description" id="hero-description">
          Understand the planets not just by name, but by measurable
          facts. From size and mass to gravity and density, this page
          breaks down the solar system in a clear, data-driven way.
        </p>
        <div class="hero-actions">
          <a href="#data-section" class="btn btn-primary" id="btn-explore">
            Explore the Data
          </a>
          <a href="#planetaryForm" class="btn btn-outline" id="btn-contact">
            Contact Us
          </a>
        </div>
      </div>

      <div class="hero-visual">
        <div class="hero-planet-wrapper">
          <div class="hero-planet-glow"></div>
          <img
            src="assets/earth.svg"
            alt="A glowing 3D planet Earth floating in space"
            class="hero-planet-img"
            id="hero-planet-img"
          />
        </div>
      </div>
    </div>
  </section>

  <!-- Interactive script -->
  <script src="script.js"></script>
</body>
</html>
