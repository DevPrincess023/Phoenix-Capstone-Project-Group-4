<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>planet distance</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    
    <div id="root"></div>
   
    <section id="data-section">
    <h3>Visualizing the Differences Between Planets</h3>
    <p>Each planet in our solar system has unique physical characteristics. Visual comparisons help highlight how vastly different terrestrial planets are from gas giants and ice giants.</p>
    
    <div class="planet-grid-container">
        <figure class="planet-card">
            <img src="https://anurella.github.io/images/planets/mercury.webp" alt="Mercury" class="planet-img">
            <figcaption><strong>Mercury</strong><p>Distance: 57.9 million km</p></figcaption>
        </figure>
        <figure class="planet-card">
            <img src="https://anurella.github.io/images/planets/venus.webp" alt="Venus" class="planet-img">
            <figcaption><strong>Venus</strong><p>Distance: 108.2 million km</p></figcaption>
        </figure>
        <figure class="planet-card">
            <img src="https://anurella.github.io/images/planets/earth.jpg" alt="Earth" class="planet-img">
            <figcaption><strong>Earth</strong><p>Distance: 149.6 million km</p></figcaption>
        </figure>
        <figure class="planet-card">
            <img src="https://anurella.github.io/images/planets/mars.webp" alt="Mars" class="planet-img">
            <figcaption><strong>Mars</strong><p>Distance: 227.9 million km</p></figcaption>
        </figure>
        <figure class="planet-card">
            <img src="https://anurella.github.io/images/planets/jupiter.webp" alt="Jupiter" class="planet-img">
            <figcaption><strong>Jupiter</strong><p>Distance: 778.6 million km</p></figcaption>
        </figure>
        <figure class="planet-card">
            <img src="https://anurella.github.io/images/planets/saturn.webp" alt="Saturn" class="planet-img">
            <figcaption><strong>Saturn</strong><p>Distance: 1433.5 million km</p></figcaption>
        </figure>
        <figure class="planet-card">
            <img src="https://anurella.github.io/images/planets/uranus.webp" alt="Uranus" class="planet-img">
            <figcaption><strong>Uranus</strong><p>Distance: 2872.5 million km</p></figcaption>
        </figure>
        <figure class="planet-card">
            <img src="https://anurella.github.io/images/planets/neptune.webp" alt="Neptune" class="planet-img">
            <figcaption><strong>Neptune</strong><p>Distance: 4495.1 million km</p></figcaption>
        </figure>
        <figure class="planet-card">
            <img src="https://anurella.github.io/images/planets/pluto.webp" alt="Pluto" class="planet-img">
            <figcaption><strong>Pluto</strong><p>Distance: 5906.4 million km</p></figcaption>
        </figure>
    </div>
</section>
     <script type="text/babel" src="planet.js"></script>
</body>
</html>
